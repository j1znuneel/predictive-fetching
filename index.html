<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinematic Predictor Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f0f2f5;
        }
        .container {
            text-align: center;
        }
        #target-button {
            padding: 15px 30px;
            font-size: 1.2rem;
            color: white;
            background: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        #target-button:hover {
            background: #0056b3;
        }
        #target-button:active {
            transform: scale(0.95);
        }
        .status {
            margin-top: 20px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kinematic Predictor</h1>
    <p>Move your mouse quickly towards the button and slow down as you approach.</p>
    <button id="target-button">Click Me!</button>
    <div class="status">Open the console (F12) to see predictions.</div>
</div>

<script src="KinematicPredictor.js"></script>
<script>
    const button = document.getElementById('target-button');
    const predictor = new KinematicPredictor(button);

    button.addEventListener('click', () => {
        alert('Button clicked!');
    });
</script>

</body>
</html>
